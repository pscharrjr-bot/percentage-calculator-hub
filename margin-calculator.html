<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Margin Calculator</title><meta name="description" content="Calculate margin percentage using revenue and cost." /><link rel="stylesheet" href="styles.css" /><script src="scripts.js" defer></script></head><body><header class="site-header"><div class="container"><div class="topbar"><a class="brand" href="index.html">Percentage Calculator Hub</a><nav class="nav"><a href="index.html">Home</a><a href="markup-calculator.html">Markup</a></nav></div><div class="hero"><h1>Margin Calculator</h1><p>Calculate gross profit margin based on revenue and cost.</p></div></div></header><main><div class="container"><section class="section calculator-layout"><div class="card"><h2>Enter values</h2><div class="input-grid"><div><label for="revenue">Revenue / Selling Price</label><input id="revenue" type="number" placeholder="100" /></div><div><label for="costMargin">Cost</label><input id="costMargin" type="number" placeholder="70" /></div></div><div class="actions"><button onclick="calcMargin()">Calculate</button><button class="secondary" onclick="clearFields(['revenue','costMargin']); setText('margin-result','—'); setText('margin-detail','Enter values to calculate.'); setText('margin-extra','');">Reset</button></div></div><div class="result-box"><div class="result-label">Margin</div><div id="margin-result" class="result-value">—</div><div id="margin-detail" class="small-note">Enter values to calculate.</div><div id="margin-extra" class="small-note"></div></div></section><section class="section"><div class="card"><h2>Formula</h2><p>Margin = <strong>((revenue - cost) ÷ revenue) × 100</strong></p></div></section></div></main><footer class="site-footer"><div class="container"><div class="footer-links"><a href="index.html">Home</a><a href="privacy.html">Privacy Policy</a></div></div></footer><script>function calcMargin(){const revenue=toNumber(document.getElementById('revenue').value);const cost=toNumber(document.getElementById('costMargin').value);if(!Number.isFinite(revenue)||!Number.isFinite(cost)||revenue===0){setText('margin-result','—');setText('margin-detail','Enter valid numbers and use revenue that is not zero.');setText('margin-extra','');return;}const profit=revenue-cost;const margin=(profit/revenue)*100;setText('margin-result',formatPercent(margin));setText('margin-detail',`Profit of $${formatNumber(profit)} on revenue of $${formatNumber(revenue)}.`);setText('margin-extra',`Cost entered: $${formatNumber(cost)}`);}</script></body></html>
