<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>What Percent Of Calculator</title><meta name="description" content="Find what percent one number is of another." /><link rel="stylesheet" href="styles.css" /><script src="scripts.js" defer></script></head><body><header class="site-header"><div class="container"><div class="topbar"><a class="brand" href="index.html">Percentage Calculator Hub</a><nav class="nav"><a href="index.html">Home</a><a href="percentage-calculator.html">Percentage</a></nav></div><div class="hero"><h1>What Percent Of Calculator</h1><p>Find what percent one number is of another. Example: 25 is what percent of 80?</p></div></div></header><main><div class="container"><section class="section calculator-layout"><div class="card"><h2>Enter values</h2><div class="input-grid"><div><label for="partVal">Part</label><input id="partVal" type="number" placeholder="25" /></div><div><label for="wholeVal">Whole</label><input id="wholeVal" type="number" placeholder="80" /></div></div><div class="actions"><button onclick="calcWhatPercent()">Calculate</button><button class="secondary" onclick="clearFields(['partVal','wholeVal']); setText('what-result','—'); setText('what-detail','Enter values to calculate.');">Reset</button></div></div><div class="result-box"><div class="result-label">Percentage</div><div id="what-result" class="result-value">—</div><div id="what-detail" class="small-note">Enter values to calculate.</div></div></section><section class="section"><div class="card"><h2>Formula</h2><p>Percentage = <strong>(part ÷ whole) × 100</strong></p></div></section></div></main><footer class="site-footer"><div class="container"><div class="footer-links"><a href="index.html">Home</a><a href="privacy.html">Privacy Policy</a></div></div></footer><script>function calcWhatPercent(){const a=toNumber(document.getElementById('partVal').value);const b=toNumber(document.getElementById('wholeVal').value);if(!Number.isFinite(a)||!Number.isFinite(b)||b===0){setText('what-result','—');setText('what-detail','Enter valid numbers and use a whole value that is not zero.');return;}const result=(a/b)*100;setText('what-result',formatPercent(result));setText('what-detail',`${formatNumber(a)} is ${formatPercent(result)} of ${formatNumber(b)}`);}</script></body></html>
